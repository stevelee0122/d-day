<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수행평가 안내</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 40px;
            letter-spacing: -0.5px;
        }

        .dday-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 35px;
        }

        .title {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 8px;
            font-weight: 500;
            letter-spacing: -0.3px;
        }

        /* 기본 상태: 선명한 네온 초록색 */
        .count {
            font-size: 42px;
            font-weight: 900;
            color: #00E676; 
            margin: 0;
            letter-spacing: -1px;
        }

        /* 🔥 D-3부터 당일까지 강렬한 빨간색 */
        .count.urgent {
            color: #FF5252; 
        }

        /* 🔘 완전히 지난 일정은 흐린 회색 */
        .count.passed {
            color: #555555; 
        }
    </style>
</head>
<body>

    <h1>수행평가 및 시험 안내</h1>

    
    <div class="dday-container">
        <div class="title">--- 기말고사 ---</div>
        <div class="count" data-date="2026-07-01">계산 중...</div>
    </div>


    <div class="dday-container">
        <div class="title">--- 과탐실 실험(조별보고서 제출) (생명과학실) ---</div>
        <div class="count" data-date="2026-06-16">계산 중...</div>
    </div>

    
    <div class="dday-container">
        <div class="title">--- 통합과학B(화학) 수행평가 ---</div>
        <div class="count" data-date="2026-06-16">계산 중...</div>
    </div>


    <div class="dday-container">
        <div class="title">--- 과탐실 개별 보고서 제출 (리로스쿨-활동보고서) ---</div>
        <div class="count" data-date="2026-06-21">계산 중...</div>
    </div>

    <div class="dday-container">
        <div class="title">--- 과탐실 개인보고서 발표 ---</div>
        <div class="count" data-date="2026-06-23">계산 중...</div>
    </div>
    
    <script>
        function calculateDday() {
            const ddayElements = document.querySelectorAll('.count');
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

            ddayElements.forEach(element => {
                const targetDateString = element.getAttribute('data-date');
                const parts = targetDateString.split('-');
                const targetDate = new Date(parts[0], parts[1] - 1, parts[2]).getTime();
                
                const distance = targetDate - today;
                const daysLeft = Math.ceil(distance / (1000 * 60 * 60 * 24));

                // 꼬여있던 이프문 조건 완벽히 정렬
                if (daysLeft > 3) {
                    element.innerText = `D-${daysLeft}`;
                } else if (daysLeft <= 3 && daysLeft > 0) {
                    element.innerText = `D-${daysLeft}`;
                    element.classList.add('urgent');
                } else if (daysLeft === 0) {
                    element.innerText = "D-Day";
                    element.classList.add('urgent');
                } else {
                    element.innerText = "종료";
                    element.classList.add('passed');
                }
            });
        }
        window.onload = calculateDday;
    </script>
</body>
</html>
